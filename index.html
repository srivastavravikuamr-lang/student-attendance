<!DOCTYPE html>
<html>
<head>
  <title>Student Attendance</title>
  <link rel="stylesheet" href="student_style.css">
  
</head>

<body>

<!-- LOGIN -->
<div id="box" class="box">
  <h2>Professor Login</h2>

  <select id="username">
    <option value="">Select Professor</option>
    <option value="MANJULA MAM">Dr.MANJULA DAS mam</option>
    <option value="SUBASIS BENARJEE">Dr.SUBASIS BENARJEE sir</option>
    <option value="AHMED SIR">Dr.SAM AHMED MAZUMDER sir</option>
    <option value="CORE SIR">Dr.SUPREME DAS sir</option>
  </select>

  <select id="subject">
    <option value="">Select Subject</option>
    <option value="ENGINEERING MECHANICS">ENGINEERING MECHANICS</option>
    <option value="DSA">DSA</option>
    <option value="HUMANITIES">HUMANITIES</option>
    <option value="METALLURGY">METALLURGY</option>
  </select>

  <select id="branchSelect" onchange="show()">
    <option value="">Select Branch</option>
    <option value="MECHANICAL">Mechanical</option>
    <option value="CIVIL">Civil</option>
    <option value="BIOTECH">Biotech</option>
  </select>


  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<!-- ATTENDANCE -->
<div id="att">
  <h2>Student Attendance Sheet</h2>

  <table id="mytable"></table><br>

  <button onclick="download()">Download / Print</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- Bottom Right -->
<div id="profName"></div>

<script src="student.js"></script>
</body>
</html>
