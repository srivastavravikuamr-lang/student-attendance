<!DOCTYPE html>
<html>
<head>
  <title>Student Attendance</title>
  <link rel="stylesheet" href="student_style.css">
  
</head>

<body>

<!-- LOGIN -->
<div id="box" class="box">
  <h2>Professor Login</h2>

  <select id="username">
    <option value="">Select Professor</option>
    <option value="MANJULA MAM">MANJULA MAM</option>
    <option value="SUBASIS BENARJEE">SUBASIS BENARJEE</option>
    <option value="AHMED SIR">AHMED SIR</option>
    <option value="CORE SIR">CORE SIR</option>
  </select>

  <select id="subject">
    <option value="">Select Subject</option>
    <option value="ENGINEERING MECHANICS">ENGINEERING MECHANICS</option>
    <option value="DSA">DSA</option>
    <option value="HUMANITIES">HUMANITIES</option>
    <option value="METALLURGY">METALLURGY</option>
  </select>

  <select id="group">
    <option value="">Select Group</option>
    <option value="A">Group A</option>
    <option value="B">Group B</option>
  </select>



  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<!-- ATTENDANCE -->
<div id="att">
  <div class="headbox">
    <h2>Student Attendance Sheet</h2>
  </div>

  <!--MULTIPLE TABLES WILL COME HERE -->
  <div id="tablesContainer"></div><br>

  <button onclick="saveAttendance()">Save Attendance</button>
  <button onclick="showSemester()">View Semester</button>
  <button id="div1" onclick="downloadToday()">Download Today Attendance</button>

  <button onclick="logout()">Logout</button>
  <button onclick="resetData()">Reset Semester</button>
</div>


<!-- Bottom Right -->
<div id="profName"></div>
  


<script src="student.js"></script>
</body>
</html>
